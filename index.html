<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>ONYX</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at center, #111 0%, #000 70%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      cursor: default;
    }

    .container {
      text-align: center;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    img {
      width: 140px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(10px);
      animation: logoIn 1.5s ease forwards;
      animation-delay: 0.5s;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 6px;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      opacity: 0;
      transform: translateY(10px);
      animation: textIn 1.5s ease forwards;
      animation-delay: 1.2s;
    }

    /* 애니메이션 */
    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes logoIn {
      to {
        opacity: 0.9;
        transform: translateY(0);
      }
    }

    @keyframes textIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 마우스 살짝 반응 */
    body:hover .container {
      transform: translateY(-2px);
      transition: 0.6s ease;
    }

  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="ONYX">
    <h1>ENGINEERED FOR IMPACT</h1>
  </div>
</body>
</html>
