<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYX</title>
  <link rel="icon" href="favicon.png" sizes="32x32">
  <link rel="icon" href="favicon.png" sizes="192x192">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    }

    :root {
      --x: 50%;
      --y: 50%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #020202;
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(
          ellipse at var(--x) var(--y),
          rgba(255,255,255,0.08) 0%,
          rgba(255,255,255,0.035) 22%,
          rgba(255,255,255,0.012) 44%,
          transparent 68%
        ),
        linear-gradient(
          180deg,
          #020202 0%,
          #060606 45%,
          #020202 100%
        );
      z-index: -3;
      transition: background 0.25s ease;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.045;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      z-index: -1;
    }

    .center-copy {
      position: relative;
      text-align: center;
      font-size: clamp(38px, 7vw, 90px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 1.16;
      padding-bottom: 0.12em;
      max-width: 92vw;
      white-space: nowrap;

      background:
        linear-gradient(180deg, #ffffff 0%, #b8b8b8 48%, #5f5f5f 100%),
        linear-gradient(
          110deg,
          transparent 0%,
          transparent 35%,
          rgba(255,255,255,0.95) 48%,
          transparent 62%,
          transparent 100%
        );
      background-size: 100% 100%, 220% 100%;
      background-position: 0 0, -140% 0;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;

      opacity: 0;
      transform: translateY(14px);
      animation:
        textIn 1.6s cubic-bezier(.16, 1, .3, 1) forwards,
        textShine 5.8s ease-in-out 2.1s infinite;
    }

    .bottom-logo {
      position: fixed;
      left: 50%;
      bottom: clamp(78px, 12vh, 130px);
      width: clamp(78px, 9vw, 112px);
      transform: translateX(-50%);
      opacity: 0;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.14));
      animation:
        logoIn 1.5s cubic-bezier(.16, 1, .3, 1) 0.7s forwards,
        floatLogo 5.5s ease-in-out 2s infinite,
        logoGlow 4.8s ease-in-out 2s infinite;
    }

    @keyframes textIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes textShine {
      0% {
        background-position: 0 0, -140% 0;
      }
      35% {
        background-position: 0 0, 140% 0;
      }
      100% {
        background-position: 0 0, 140% 0;
      }
    }

    @keyframes logoIn {
      to {
        opacity: 0.78;
      }
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    @keyframes logoGlow {
      0%, 100% {
        filter: drop-shadow(0 0 22px rgba(255,255,255,0.12));
      }
      50% {
        filter: drop-shadow(0 0 38px rgba(255,255,255,0.28));
      }
    }

    @media (max-width: 768px) {
      .center-copy {
        font-size: clamp(30px, 8vw, 54px);
        letter-spacing: -0.035em;
      }

      .bottom-logo {
        width: clamp(72px, 18vw, 96px);
        bottom: clamp(76px, 12vh, 104px);
      }
    }

    @media (max-width: 430px) {
      .center-copy {
        font-size: clamp(28px, 8.5vw, 38px);
        white-space: normal;
        max-width: 340px;
        line-height: 1.18;
      }

      .bottom-logo {
        width: 78px;
        bottom: 86px;
      }
    }

    @media (hover: none) {
      body::before {
        background:
          radial-gradient(
            ellipse at 50% 48%,
            rgba(255,255,255,0.07) 0%,
            rgba(255,255,255,0.025) 34%,
            transparent 70%
          ),
          linear-gradient(
            180deg,
            #020202 0%,
            #060606 45%,
            #020202 100%
          );
      }
    }
  </style>
</head>

<body>
  <h1 class="center-copy">Engineered for Impact.</h1>

  <img class="bottom-logo" src="logo.png" alt="ONYX" />

  <script>
    const root = document.documentElement;

    window.addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth) * 100;
      const y = (event.clientY / window.innerHeight) * 100;

      root.style.setProperty("--x", `${x}%`);
      root.style.setProperty("--y", `${y}%`);
    });
  </script>
</body>
</html>
