<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONYX</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #020202;
      color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.025) 18%,
          rgba(255, 255, 255, 0.075) 50%,
          rgba(255, 255, 255, 0.025) 82%,
          transparent 100%
        ),
        linear-gradient(
          180deg,
          #030303 0%,
          #080808 42%,
          #020202 100%
        );
      z-index: -3;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.045;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      z-index: -1;
    }

    .center-copy {
      position: relative;
      text-align: center;
      font-size: clamp(18px, 2.4vw, 34px);
      font-weight: 500;
      letter-spacing: -0.035em;
      line-height: 1;
      background: linear-gradient(180deg, #ffffff 0%, #b8b8b8 48%, #5f5f5f 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      opacity: 0;
      transform: translateY(14px);
      animation: textIn 1.6s cubic-bezier(.16, 1, .3, 1) forwards;
    }

    .bottom-logo {
      position: fixed;
      left: 50%;
      bottom: 42px;
      width: 54px;
      transform: translateX(-50%);
      opacity: 0;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.16));
      animation:
        logoIn 1.5s cubic-bezier(.16, 1, .3, 1) 0.7s forwards,
        floatLogo 5.5s ease-in-out 2s infinite;
    }

    @keyframes textIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes logoIn {
      to {
        opacity: 0.72;
      }
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-8px);
      }
    }

    @media (max-width: 600px) {
      .center-copy {
        font-size: 20px;
        letter-spacing: -0.02em;
      }

      .bottom-logo {
        width: 44px;
        bottom: 32px;
      }
    }
  </style>
</head>

<body>
  <h1 class="center-copy">Engineered for Impact.</h1>

  <img class="bottom-logo" src="logo.png" alt="ONYX" />
</body>
</html>
